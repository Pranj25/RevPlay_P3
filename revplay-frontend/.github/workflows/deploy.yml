# 🚀 RevPlay Deployment Workflow

name: 🚀 Deploy RevPlay Frontend

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 🏗️ Build and Test
  build-test:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🧪 Test
        run: npm run test:ci

      - name: 🏗️ Build
        run: npm run build:prod

      - name: 📊 Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info

  # 🐳 Build Docker Image
  build-image:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' || github.event.inputs.environment
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🐳 Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 🚀 Deploy to Staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'
    environment: staging

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-production
          path: dist/

      - name: 🚀 Deploy to Staging
        run: |
          echo "🚀 Deploying to staging environment..."
          
          # AWS S3 + CloudFront Deployment
          aws s3 sync dist/ s3://staging.revplay.com --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_STAGING_ID }} --paths "/*"
          
          # Alternative: Firebase Hosting
          # firebase deploy --only hosting:staging --token ${{ secrets.FIREBASE_TOKEN }}
          
          # Alternative: Vercel
          # vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
          
          echo "✅ Staging deployment completed!"

      - name: 🧪 Run E2E Tests
        run: |
          echo "🧪 Running E2E tests on staging..."
          npm run test:e2e:staging

      - name: 📊 Performance Test
        run: |
          echo "📊 Running performance tests..."
          npm run test:performance

  # 🚀 Deploy to Production
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-test, build-image]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    environment: production

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-production
          path: dist/

      - name: 🚀 Deploy to Production
        run: |
          echo "🚀 Deploying to production environment..."
          
          # AWS S3 + CloudFront Deployment
          aws s3 sync dist/ s3://www.revplay.com --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_PRODUCTION_ID }} --paths "/*"
          
          # Alternative: Firebase Hosting
          # firebase deploy --only hosting:production --token ${{ secrets.FIREBASE_TOKEN }}
          
          # Alternative: Vercel
          # vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
          
          echo "✅ Production deployment completed!"

      - name: 🧪 Run E2E Tests
        run: |
          echo "🧪 Running E2E tests on production..."
          npm run test:e2e:production

      - name: 📊 Performance Test
        run: |
          echo "📊 Running performance tests..."
          npm run test:performance

      - name: 📢 Notify Success
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#deployments'
          text: '🚀 RevPlay Frontend deployed successfully to production!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # 🔄 Rollback
  rollback:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.rollback == 'true'
    needs: deploy-production
    environment: production

    steps:
      - name: 🔄 Rollback Deployment
        run: |
          echo "🔄 Rolling back to previous version..."
          
          # Rollback logic
          aws s3 sync s3://www.revplay.com.backup s3://www.revplay.com --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_PRODUCTION_ID }} --paths "/*"
          
          echo "✅ Rollback completed!"

      - name: 📢 Notify Rollback
        uses: 8398a7/action-slack@v3
        with:
          status: warning
          channel: '#deployments'
          text: '🔄 RevPlay Frontend rolled back to previous version!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # 📊 Performance Monitoring
  performance-monitoring:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📊 Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.12.x
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: 📊 Upload Lighthouse Results
        uses: actions/upload-artifact@v3
        with:
          name: lighthouse-results
          path: .lighthouseci/

      - name: 📊 Performance Budget Check
        run: |
          echo "📊 Checking performance budget..."
          # Performance budget checks
          npm run check:performance
