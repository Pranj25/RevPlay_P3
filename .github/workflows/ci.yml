name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: revplay-frontend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./revplay-frontend
      run: npm ci
    
    - name: Build frontend
      working-directory: ./revplay-frontend
      run: npm run build
    
    - name: Upload frontend artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: revplay-frontend/dist/

  backend:
    runs-on: ubuntu-latest
    needs: frontend
    strategy:
      matrix:
        service: [common, config-server, eureka-server, api-gateway, user-service, catalog-service, playlist-service, favourite-service, playback-service, analytics-service]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build ${{ matrix.service }}
      working-directory: ./${{ matrix.service }}
      run: mvn clean compile
    
    - name: Test ${{ matrix.service }}
      working-directory: ./${{ matrix.service }}
      run: mvn test
    
    - name: Package ${{ matrix.service }}
      working-directory: ./${{ matrix.service }}
      run: mvn package -DskipTests
    
    - name: Upload ${{ matrix.service }} artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.service }}-jar
        path: ${{ matrix.service }}/target/*.jar
