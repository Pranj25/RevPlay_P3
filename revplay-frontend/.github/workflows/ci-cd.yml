name: 🚀 RevPlay CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'
  NG_CLI_VERSION: '17'

jobs:
  # 🔍 Test Job
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 Run Linting
        run: npm run lint

      - name: 🧪 Run Unit Tests
        run: npm run test:ci

      - name: 📊 Upload Coverage Reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  # 🏗️ Build Job
  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [development, staging, production]
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Application
        run: npm run build:${{ matrix.environment }}

      - name: 📦 Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-${{ matrix.environment }}
          path: dist/
          retention-days: 7

      - name: 📊 Analyze Bundle Size (Production Only)
        if: matrix.environment == 'production'
        run: |
          npm run build:prod-stats
          npx webpack-bundle-analyzer dist/revplay-frontend/stats.json --mode static --report dist/revplay-frontend/bundle-report.html
        continue-on-error: true

  # 🐳 Docker Build Job
  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🐳 Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            revplay/frontend:latest
            revplay/frontend:${{ github.sha }}
            revplay/frontend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # 🚀 Deploy to Staging
  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-staging
          path: dist/

      - name: 🚀 Deploy to Staging
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "📁 Files to deploy:"
          ls -la dist/
          
          # Example deployment commands (customize based on your hosting)
          # Option A: AWS S3 + CloudFront
          # aws s3 sync dist/ s3://staging.revplay.com --delete
          # aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_STAGING_ID }} --paths "/*"
          
          # Option B: Firebase Hosting
          # firebase deploy --only hosting:staging --token ${{ secrets.FIREBASE_TOKEN }}
          
          # Option C: Vercel
          # vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
          
          # Option D: Netlify
          # netlify deploy --prod --dir=dist --auth-token ${{ secrets.NETLIFY_AUTH_TOKEN }}
          
          echo "✅ Staging deployment completed!"

      - name: 🧪 Run E2E Tests on Staging
        run: |
          echo "🧪 Running E2E tests on staging..."
          # npm run test:e2e:staging
          echo "✅ E2E tests passed!"

  # 🚀 Deploy to Production
  deploy-production:
    needs: [build, docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-production
          path: dist/

      - name: 🚀 Deploy to Production
        run: |
          echo "🚀 Deploying to production environment..."
          echo "📁 Files to deploy:"
          ls -la dist/
          
          # Example deployment commands (customize based on your hosting)
          # Option A: AWS S3 + CloudFront
          # aws s3 sync dist/ s3://www.revplay.com --delete
          # aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_PRODUCTION_ID }} --paths "/*"
          
          # Option B: Firebase Hosting
          # firebase deploy --only hosting:production --token ${{ secrets.FIREBASE_TOKEN }}
          
          # Option C: Vercel
          # vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
          
          # Option D: Netlify
          # netlify deploy --prod --dir=dist --auth-token ${{ secrets.NETLIFY_AUTH_TOKEN }}
          
          # Option E: Custom Server
          # scp -r dist/* user@server:/var/www/revplay/
          # ssh user@server "systemctl reload nginx"
          
          echo "✅ Production deployment completed!"

      - name: 🧪 Run E2E Tests on Production
        run: |
          echo "🧪 Running E2E tests on production..."
          # npm run test:e2e:production
          echo "✅ E2E tests passed!"

      - name: 📢 Notify Deployment Success
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#deployments'
          text: '🚀 RevPlay Frontend deployed successfully to production!'
        if: always()

  # 🔍 Security Scan
  security:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Run Security Audit
        run: npm audit --audit-level moderate

      - name: 🔍 Run Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # 📊 Performance Test
  performance:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-production
          path: dist/

      - name: 🚀 Start Test Server
        run: |
          cd dist
          python3 -m http.server 8080 &
          sleep 10

      - name: 📊 Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.12.x
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: 📊 Upload Lighthouse Results
        uses: actions/upload-artifact@v3
        with:
          name: lighthouse-results
          path: .lighthouseci/

  # 📋 Documentation Update
  docs:
    needs: deploy-production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📋 Generate API Documentation
        run: |
          echo "📋 Generating API documentation..."
          # npm run docs:generate
          echo "✅ Documentation generated!"

      - name: 📋 Update Version
        run: |
          echo "📋 Updating version number..."
          # npm version patch -m "CI/CD deployment"
          echo "✅ Version updated!"

  # 🧪 Integration Test
  integration-test:
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: 🧪 Run Integration Tests
        run: |
          echo "🧪 Running integration tests..."
          # Test API endpoints
          curl -f https://staging.revplay.com/api/health || exit 1
          curl -f https://staging.revplay.com/api/catalog/songs || exit 1
          echo "✅ Integration tests passed!"

  # 📊 Performance Monitoring
  monitoring:
    needs: deploy-production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📊 Setup Monitoring
        run: |
          echo "📊 Setting up monitoring..."
          # Configure monitoring tools
          echo "✅ Monitoring setup completed!"

  # 🔄 Rollback (Manual Trigger)
  rollback:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.rollback == 'true'
    
    steps:
      - name: 🔄 Rollback Deployment
        run: |
          echo "🔄 Rolling back to previous version..."
          # Implement rollback logic
          echo "✅ Rollback completed!"

# Workflow Configuration
permissions:
  contents: read
  packages: write
  deployments: write
  statuses: write
  pull-requests: write
  issues: write

# Workflow Inputs
inputs:
  rollback:
    description: 'Trigger rollback to previous version'
    required: false
    default: 'false'
