server:
  port: 8088

spring:
  application:
    name: playback-service
  config:
    import: configserver:http://localhost:8888
  cloud:
    config:
      profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/revplay_playback_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: PranjalP@2003
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

# Media streaming configuration
media:
  streaming:
    chunk-size: 8192
    buffer-size: 16384
  supported-formats: mp3,wav,flac,aac,ogg

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
    prefer-ip-address: true

# Logging
logging:
  level:
    com.revplay.playbackservice: DEBUG
