server:
  port: 8085

spring:
  application:
    name: user-service
  config:
    import: configserver:http://localhost:8888
  cloud:
    config:
      profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/revplay_user_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: PranjalP@2003
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
    prefer-ip-address: true

# JWT Configuration
jwt:
  secret: revplaySecretKeyForJWTTokenGenerationAndValidation2024
  expiration: 86400000 # 24 hours

# Logging
logging:
  level:
    com.revplay.userservice: DEBUG
    org.springframework.security: DEBUG

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    docExpansion: none
    disable-swagger-default-url: true
    displayRequestDuration: true
    defaultModelsExpandDepth: 1
    defaultModelExpandDepth: 1
