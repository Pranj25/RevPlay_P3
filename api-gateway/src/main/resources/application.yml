server:
  port: ${PORT:9080}

spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=2
            
        - id: catalog-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/catalog/**
          filters:
            - StripPrefix=2
            
        - id: music-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/music/**
          filters:
            - StripPrefix=2
            
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - http://localhost:4200
              - http://localhost:3000
              - https://*.vercel.app
              - https://revplay-frontend-*.vercel.app
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.reactive: DEBUG
    com.netflix.discovery: DEBUG
