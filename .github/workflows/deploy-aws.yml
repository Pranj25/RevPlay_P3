# 🚀 RevPlay AWS S3 Deployment

name: Deploy to AWS S3

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    name: 🚀 Deploy Frontend to AWS S3
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: revplay-frontend/package-lock.json

      - name: � Install Dependencies
        run: |
          cd revplay-frontend
          npm ci

      - name: 🏗️ Build Application
        run: |
          cd revplay-frontend
          npm run build -- --configuration=production

      - name: � Install AWS CLI
        if: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install

      - name: �🚀 Deploy to AWS S3
        if: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          cd revplay-frontend
          aws s3 sync dist/revplay-frontend/ s3://revplay-music-platform --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: 🧪 Test Deployment
        if: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          curl -f http://revplay-music-platform.s3.amazonaws.com || exit 1
          echo "✅ Frontend deployed successfully!"

      - name: � Build Summary
        run: |
          echo "� Build completed successfully!"
          if [ "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "� Deployed to: http://revplay-music-platform.s3.amazonaws.com"
          else
            echo "⚠️ AWS credentials not configured - build only"
          fi
